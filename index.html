<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vape Delivery | Богданівка та район</title>
    <style>
        :root {
            --main-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #00d4ff;
            --green: #39ff14;
            --red: #ff3131;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--main-bg);
            color: white;
            padding-bottom: 60px;
        }

        header {
            background: #151515;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .hero {
            text-align: center;
            padding: 30px 15px;
            background: linear-gradient(to bottom, #151515, #0f0f0f);
        }

        .hero h1 { margin: 0; font-size: 1.8em; color: var(--accent); }
        .hero p { color: #888; font-size: 0.9em; margin: 10px 0; }

        .delivery-zones {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85em;
            margin-top: 15px;
        }

        #shop {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 5%;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .price-box { margin: 10px 0; }
        .current-price { font-size: 1.5em; font-weight: bold; color: var(--green); }
        .old-price { text-decoration: line-through; color: #555; font-size: 0.9em; margin-right: 10px; }

        button.buy-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
        }

        #panic-button {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--red);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 49, 49, 0.5);
        }

        #age-gate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="age-gate">
        <div style="padding: 20px;">
            <h2>Вам вже є 18 років?</h2>
            <button onclick="document.getElementById('age-gate').style.display='none'" style="padding: 10px 40px; background: var(--accent); border: none; border-radius: 5px; font-weight: bold;">ТАК</button>
        </div>
    </div>

    <button id="panic-button" onclick="panic()">⚠️ ЗАКРИТИ (Esc)</button>

    <header>
        <div class="logo">VAPE<span>-DELIVERY</span></div>
        <div style="font-size: 0.8em; color: var(--green);">● Online 24/7</div>
    </header>

    <section class="hero">
        <h1>Швидка доставка</h1>
        <div class="delivery-zones">
            📍 Богданівка • Онищенки • Малківка • Даньківка
        </div>
        <p>Найкращі ціни в районі. Анонімно. Швидко.</p>
    </section>

    <main id="shop"></main>

    <script>
        const products = [
            {
                name: "Vaporesso XROS 3 mini",
                price: 940,
                oldPrice: 1150,
                img: "https://vapehub.org.ua/image/cache/catalog/tovary/pod_systemi/vaporesso/xros3/vaporesso-xros-3-pod-kit-black-700x700.jpg"
            },
            {
                name: "Картридж XROS (усі види)",
                price: 140,
                oldPrice: 160,
                img: "https://vape2go.com.ua/image/cache/catalog/products/vaporesso-xros-replacement-pod-cartridge-1.2-ohm-700x700.jpg"
            },
            {
                name: "Жижа Chaser 30ml",
                price: 300,
                oldPrice: 290,
                img: "https://vapehub.org.ua/image/cache/catalog/tovary/zhidkosti/chaser/chaser-lux/chaser-lux-strawberry-banana-600x600.jpg"
            },
            {
                name: "Жижа Lucky 30ml",
                price: 350,
                oldPrice: 340,
                img: "https://vapehub.org.ua/image/cache/catalog/tovary/zhidkosti/elf-bar/elfliq/sour-apple-700x700.jpg"
            }
        ];

        const shop = document.getElementById('shop');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price-box">
                    <span class="old-price">${p.oldPrice} грн</span>
                    <span class="current-price">${p.price} грн</span>
                </div>
                <button class="buy-btn" onclick="order('${p.name}')">ЗАМОВИТИ</button>
            `;
            shop.appendChild(card);
        });

        function order(name) {
            const tgName = 'ТВІЙ_НІК_ТГ'; // ЗАМІНИ НА СВІЙ НІК
            const text = `Вітаю! Хочу замовити: ${name}. Доставка в (вкажіть ваше село).`;
            window.open(`https://t.me/${tgName}?text=${encodeURIComponent(text)}`, '_blank');
        }

        function panic() {
            window.location.href = "https://www.google.com";
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") panic();
        });
    </script>
</body>
</html>
